# Setup
title: Simple Blog Page
description: compartir cosas que hago en mi tiempo libre
url: https://github.com/MisterriiXL
avatar: /avatar.jpg
paginate: 5
permalink: pretty
cover_image: /bg.jpg

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

logo: logo.png
social:
  name: MisterriiXL
  links:
    - https://github.com/MisterriiXL
google_site_verification: xxxxx
lang: es

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
google_analytics: G-1L7EXDLQ58

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Misterrii XL
  url: https://github.com/MisterriiXL
  email: misterriixl@gmail.com
